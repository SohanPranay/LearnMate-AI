# Render deployment config for the LearnMate AI backend.
# Deploy this as a "Web Service" on Render (https://render.com).
# Set the following environment variables in the Render dashboard:
#   NODE_ENV=production
#   MONGODB_URI=<your MongoDB Atlas connection string>
#   IBM_CLOUD_API_KEY=<your IBM Cloud API key>
#   IBM_WATSONX_PROJECT_ID=<your WatsonX project id>
#   IBM_GRANITE_API_URL=https://us-south.ml.cloud.ibm.com/ml/v1/text/generation?version=2023-05-29
#   IBM_GRANITE_MODEL_ID=ibm/granite-13b-instruct-v2

services:
  - type: web
    name: learnmate-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: IBM_CLOUD_API_KEY
        sync: false
      - key: IBM_WATSONX_PROJECT_ID
        sync: false
      - key: IBM_GRANITE_API_URL
        sync: false
      - key: IBM_GRANITE_MODEL_ID
        sync: false
